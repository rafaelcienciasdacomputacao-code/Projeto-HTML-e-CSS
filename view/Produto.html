<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZoneST - Apex pro TKL</title>
    <meta name="description" content="Teclado Mecânico Apex Pro TKL - Ultra resposta com iluminação RGB Aura-Sync.">
    <link rel="stylesheet" href="../css/Visual_pagina_produto.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">GameZoneST</div>
        <nav>
            <ul>
                <li><a href="#">Games</a></li>
                <li><a href="#" class="active">Perifericos</a></li>
                <li><a href="#">Hardware</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-container">
        <section class="product-gallery">
            <div class="main-image">
                <span class="badge">PRODUTO PREMIUM</span>
                <img id="foto-principal" src="../img/apex1.png" alt="Teclado Apex Pro TKL visto de cima">
            </div>

            <div class="thumbnails">
                <div class="thumb"> 
                    <img src="../img/apex2.webp" alt="Miniatura Apex Pro TKL" onclick="trocarImagem(this.src)">
                </div>
            </div>
        </section>

        <section class="product-info">
            <h1>Apex pro TKL</h1>
            <p>Teclado Mecânico Óptico de Ultra-Resposta com iluminação RGB Aura-Sync.</p>
            
            <div class="price-card">
                <span class="old-price">R$ 1.209,90</span>
                <span class="current-price">R$ 899,90</span>
                <button class="btn-add" aria-label="Adicionar ao carrinho">Adicionar ao Carrinho</button>
                <button class="btn-buy" aria-label="Comprar agora">Comprar Agora</button>
            </div>
        </section>
    </main>

    <script>
        function trocarImagem(endereco) {
            document.getElementById('foto-principal').src = endereco;
        }
    </script>

</body>
</html>
