<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZoneST - Aerox 9</title>
    <meta name="description" content="Teclado Mecânico Apex Pro TKL - Ultra resposta com iluminação RGB Aura-Sync.">
    <link rel="stylesheet" href="../css/mouseaerox9.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">GameZoneST</div>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="../view/perifericos.html">Perifericos</a></li> <!-- ativo nesta página -->
                <li><a href="../view/hardware.html">Hardware</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-container">
        <section class="product-gallery">
            <!-- Radios escondidos -->
            <input type="radio" name="galeria" id="radio1" checked>
            <input type="radio" name="galeria" id="radio2">

            <!-- Imagens principais -->
            <div class="main-image">
                <span class="badge">PRODUTO PREMIUM</span>
                <img src="../img/mouse_arox.webp" alt="Mouse Aerox 9 visto de cima" class="foto" id="img1">
                <img src="../img/mouse_aerox2.webp" alt="Mouse Aerox 9 alternativo" class="foto" id="img2">
            </div>

            <!-- Miniaturas -->
            <div class="thumbnails">
                <label for="radio1" class="thumb">
                    <img src="../img/mouse_arox.webp" alt="Miniatura principal">
                </label>
                <label for="radio2" class="thumb">
                    <img src="../img/mouse_aerox2.webp" alt="Miniatura alternativa">
                </label>
            </div>
        </section>

        <section class="product-info">
            <h1>Aerox 9 Wireless</h1>
            <p>Mouse Arox 9 Wireless: design ergonômico e conexão sem fio estável.
Alta precisão e bateria duradoura para desempenho contínuo.</p>
            
            <div class="price-card">
                <span class="old-price">R$ 999,90</span>
                <span class="current-price">R$ 599,90</span>
                <button class="btn-add" aria-label="Adicionar ao carrinho">Adicionar ao Carrinho</button>
                <button class="btn-buy" aria-label="Comprar agora">Comprar Agora</button>
            </div>
        </section>
    </main>

</body>
</html>
